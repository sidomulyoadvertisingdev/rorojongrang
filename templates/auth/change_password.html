{% extends "base.html" %}
{% block title %}Ubah Password - Roro Jonggrang{% endblock %}
{% block content %}
<div style="max-width:560px; margin:0 auto; padding:40px 24px;">
    <div style="margin-bottom:32px;">
        <h1 style="font-size:24px; font-weight:800; color:var(--text); font-family:'Playfair Display',serif; margin-bottom:4px;">Ubah Password</h1>
        <p style="font-size:14px; color:var(--text-sec);">Pastikan akun Anda tetap aman</p>
    </div>

    <div class="card" style="padding:32px;">
        <form method="POST" style="display:flex; flex-direction:column; gap:20px;">
            <div>
                <label style="display:block; font-size:13px; font-weight:600; color:var(--text-sec); margin-bottom:6px;">Password Saat Ini</label>
                <input type="password" name="current_password" required class="input" placeholder="Masukkan password saat ini">
            </div>
            <div style="height:1px; background:var(--border); margin:4px 0;"></div>
            <div>
                <label style="display:block; font-size:13px; font-weight:600; color:var(--text-sec); margin-bottom:6px;">Password Baru</label>
                <input type="password" name="new_password" required class="input" placeholder="Minimal 6 karakter">
            </div>
            <div>
                <label style="display:block; font-size:13px; font-weight:600; color:var(--text-sec); margin-bottom:6px;">Konfirmasi Password Baru</label>
                <input type="password" name="confirm_password" required class="input" placeholder="Ulangi password baru">
            </div>
            <div style="display:flex; gap:12px; margin-top:8px;">
                <a href="{{ url_for('dashboard.index') }}" class="btn-secondary" style="padding:10px 20px; text-decoration:none;">Batal</a>
                <button type="submit" class="btn-primary" style="padding:10px 24px;">Ubah Password</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
