{% extends "base.html" %}
{% block title %}Login - Roro Jonggrang{% endblock %}
{% block auth_content %}
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; position:relative; overflow:hidden;">
    <div class="auth-bg" aria-hidden="true"></div>
    <div style="width:100%; max-width:420px; position:relative; z-index:2;">
        <div style="text-align:center; margin-bottom:32px;">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo" style="width:64px; height:64px; border-radius:18px; object-fit:contain; margin:0 auto 16px; display:block; box-shadow:0 0 30px rgba(245,158,11,0.3);" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <div style="width:64px; height:64px; border-radius:18px; background:linear-gradient(135deg,var(--grad-start),var(--grad-end)); display:none; align-items:center; justify-content:center; margin:0 auto 16px; color:#fff; font-size:28px; font-weight:800; box-shadow:0 0 30px rgba(245,158,11,0.3);">R</div>
            <h1 style="font-size:28px; font-weight:900; letter-spacing:-0.5px; font-family:'Playfair Display',serif;"><span style="color:var(--brand-roro);">Roro</span> <span style="color:var(--brand-jonggrang);">Jonggrang</span></h1>
            <p style="color:var(--text-sec); margin-top:4px; font-size:14px; font-weight:500;">Data Scrape Platform</p>
        </div>
        <div class="card" style="padding:32px;">
            <h2 style="font-size:18px; font-weight:700; color:var(--text); margin-bottom:24px; font-family:'Playfair Display',serif;">Masuk ke akun Anda</h2>

            <a href="{{ url_for('auth.google_login') }}" style="display:flex; align-items:center; justify-content:center; gap:10px; width:100%; padding:12px; border-radius:10px; border:1.5px solid var(--border); background:var(--bg-card); color:var(--text); font-size:14px; font-weight:600; cursor:pointer; transition:all .2s; text-decoration:none; margin-bottom:20px;" onmouseover="this.style.borderColor='rgba(245,158,11,0.3)'" onmouseout="this.style.borderColor='var(--border)'">
                <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                Masuk dengan Google
            </a>

            <div style="display:flex; align-items:center; gap:12px; margin-bottom:20px;">
                <div style="flex:1; height:1px; background:var(--border);"></div>
                <span style="font-size:12px; color:var(--text-muted); font-weight:600;">ATAU</span>
                <div style="flex:1; height:1px; background:var(--border);"></div>
            </div>

            <form method="POST" style="display:flex; flex-direction:column; gap:16px;">
                <div>
                    <label style="display:block; font-size:13px; font-weight:600; color:var(--text-sec); margin-bottom:6px;">Email</label>
                    <input type="email" name="email" required class="input" placeholder="anda@email.com" autofocus>
                </div>
                <div>
                    <label style="display:block; font-size:13px; font-weight:600; color:var(--text-sec); margin-bottom:6px;">Password</label>
                    <input type="password" name="password" required class="input" placeholder="Minimal 6 karakter">
                </div>
                <button type="submit" class="btn-primary" style="width:100%; justify-content:center; padding:12px; font-size:15px; margin-top:8px;">
                    Masuk
                </button>
            </form>
            <p style="text-align:center; font-size:13px; color:var(--text-sec); margin-top:20px;">
                Belum punya akun?
                <a href="{{ url_for('auth.register') }}" style="color:var(--accent); font-weight:600;">Daftar sekarang</a>
            </p>
        </div>
        <p style="text-align:center; font-size:12px; color:var(--text-muted); margin-top:24px;">
            <a href="{{ url_for('blog.home', lang='id') }}" style="color:var(--text-sec);">&larr; Kembali ke beranda</a>
        </p>
    </div>
</div>
<style>
    .auth-bg {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: 0;
        background-image: url('{{ url_for("static", filename="img/hero-bg.png") }}');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
    }
    .auth-bg::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(14,13,19,0.85) 0%, rgba(14,13,19,0.7) 50%, rgba(14,13,19,0.85) 100%);
        pointer-events: none;
    }
</style>
{% endblock %}
