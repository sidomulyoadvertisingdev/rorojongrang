{% extends "base.html" %}
{% block title %}Login - RoroJonggrang{% endblock %}
{% block auth_content %}
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; background:var(--bg); position:relative; overflow:hidden;">
    <div style="position:absolute; top:-50%; left:-50%; right:-50%; bottom:-50%; background:radial-gradient(ellipse at 30% 50%, rgba(139,92,246,0.08) 0%, transparent 50%), radial-gradient(ellipse at 70% 50%, rgba(6,182,148,0.05) 0%, transparent 50%); pointer-events:none; animation:fogDrift1 20s ease-in-out infinite alternate;"></div>
    <div style="position:absolute; top:-30%; left:-30%; right:-30%; bottom:-30%; background:radial-gradient(ellipse at 50% 80%, rgba(139,92,246,0.04) 0%, transparent 60%); pointer-events:none; animation:fogDrift2 25s ease-in-out infinite alternate;"></div>
    <div style="width:100%; max-width:420px; position:relative; z-index:2;">
        <div style="text-align:center; margin-bottom:32px;">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo" style="width:64px; height:64px; border-radius:18px; object-fit:contain; margin:0 auto 16px; display:block; box-shadow:0 0 30px rgba(139,92,246,0.3);" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <div style="width:64px; height:64px; border-radius:18px; background:linear-gradient(135deg,var(--grad-start),var(--grad-end)); display:none; align-items:center; justify-content:center; margin:0 auto 16px; color:#fff; font-size:28px; font-weight:800; box-shadow:0 0 30px rgba(139,92,246,0.3);">R</div>
            <h1 style="font-size:28px; font-weight:900; color:var(--text); letter-spacing:-0.5px; font-family:'Playfair Display',serif;">RoroJonggrang</h1>
            <p style="color:var(--text-sec); margin-top:4px; font-size:14px; font-weight:500;">Data Scrape Platform</p>
        </div>
        <div class="card" style="padding:32px;">
            <h2 style="font-size:18px; font-weight:700; color:var(--text); margin-bottom:24px; font-family:'Playfair Display',serif;">Masuk ke akun Anda</h2>
            <form method="POST" style="display:flex; flex-direction:column; gap:16px;">
                <div>
                    <label style="display:block; font-size:13px; font-weight:600; color:var(--text-sec); margin-bottom:6px;">Email</label>
                    <input type="email" name="email" required class="input" placeholder="anda@email.com" autofocus>
                </div>
                <div>
                    <label style="display:block; font-size:13px; font-weight:600; color:var(--text-sec); margin-bottom:6px;">Password</label>
                    <input type="password" name="password" required class="input" placeholder="Minimal 6 karakter">
                </div>
                <button type="submit" class="btn-primary" style="width:100%; justify-content:center; padding:12px; font-size:15px; margin-top:8px;">
                    Masuk
                </button>
            </form>
            <p style="text-align:center; font-size:13px; color:var(--text-sec); margin-top:20px;">
                Belum punya akun?
                <a href="{{ url_for('auth.register') }}" style="color:var(--accent); font-weight:600;">Daftar sekarang</a>
            </p>
        </div>
        <p style="text-align:center; font-size:12px; color:var(--text-muted); margin-top:24px;">
            <a href="{{ url_for('blog.home') }}" style="color:var(--text-sec);">&larr; Kembali ke beranda</a>
        </p>
    </div>
</div>
<style>
    @keyframes fogDrift1 {
        0% { transform: translateX(-30px) translateY(0); opacity:.6; }
        50% { opacity:1; }
        100% { transform: translateX(30px) translateY(-20px); opacity:.7; }
    }
    @keyframes fogDrift2 {
        0% { transform: translateX(20px) translateY(10px); opacity:.5; }
        50% { opacity:.9; }
        100% { transform: translateX(-20px) translateY(-15px); opacity:.6; }
    }
</style>
{% endblock %}
